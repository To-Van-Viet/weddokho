<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <script src="../js/login.js"></script>
    <script src="../js/bootstrap.bundle.js"></script>
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="shortcut icon" href="../img/logo2.png" type="image/x-icon" />
    <title>Đăng nhập</title>
  </head>
  <body>
    
    <div id="khungtrang">
      <header class="header-section border border-3 border-warning shadow-sm sticky-top bg-dark">
        <div class="container py-1 py-md-1">
            <div class="row align-items-center">
                <div class="col-md-2 col-4">
                    <a href="../html/home.html" class="d-block text-center text-md-start">
                        <img src="../img/logo.jpg" class="img-fluid logo-img" alt="Logo" style="max-height: 100px;">
                    </a>
                </div>
                <div class="col-md-4 col-8 text-center">
                  <h2 class="text-warning mb-0">Trang đăng nhập</h2>  
                </div>
            </div>
        </div>
      </header>

      <div class="banner">
          <div class="marquee bg-info mx-auto">
            <span class="text-black">Chào mừng bạn trở lại! Vui lòng đăng nhập để tiếp tục mua sắm.</span>
          </div>
      </div>

    <main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-10 col-md-7 col-lg-5 border border-3 bg-body-tertiary rounded-3 shadow-sm p-4">
            <form id="loginForm">
                <div class="h2 text-primary text-center mb-4 fw-bold">Đăng nhập</div>
                
                <div class="mb-3 text-start">
                    <label for="name23" class="form-label fw-bold">Tên đăng nhập:</label>
                    <input type="text" id="name23" name="username" placeholder="Nhập tên đăng nhập" class="form-control form-control-lg" onblur="kttendn()" required />
                    <div class="mt-1 text-danger small"><span id="er66">*</span></div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label fw-bold" for="pw">Mật khẩu:</label>
                    <div class="input-group">
                        <input id="pw" name="password" type="password" placeholder="Nhập mật khẩu" class="form-control form-control-lg" onblur="ktpassword()" required />
                        <button class="btn btn-outline-secondary" type="button" id="btnShow" onclick="togglePassword()">Hiện</button>
                    </div>
                    <div class="mt-1 text-danger small"><span id="er4">*</span></div>
                </div>

                <div class="row mb-4">
                    <div class="col-6 text-start">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label small" for="rememberMe">Ghi nhớ</label>
                        </div>
                    </div>
                    <div class="col-6 text-end">
                        <a href="#" class="small text-decoration-none">Quên mật khẩu?</a>
                    </div>
                </div>

                <button id="loginbtn" type="submit" class="btn btn-primary btn-lg w-100 mb-3 shadow-sm">ĐĂNG NHẬP</button>

                <div class="text-center">
                    <p class="small mb-0">Chưa có tài khoản? <a href="register.html" class="text-primary fw-bold text-decoration-none">Đăng ký ngay</a></p>
                </div>
            </form>
        </div>
    </div>
</main>


    <footer style="background-image: url('../img/footer.jpg'); background-size: cover; background-position: center; color: white; padding: 40px 0;">
        <div class="container">
            <div class="row text-center text-md-start">
                <div class="col-4 mb-3 d-flex flex-column align-items-center text-center">
                    <img src="../img/logo.jpg" alt="Logo" class="footer-logo" style="width: 100px; height: 100px;">
                    <p style="color: white; margin-top: 10px;">Chuyên cung cấp các loại đồ khô chất lượng cao.</p>
                </div>
                <div class="col-4 mb-3"><h5>Chi nhánh</h5><hr style="border: none; border-top: 2px dotted #38ef7d;"></div>
                <div class="col-4 mb-3"><h5>Liên hệ</h5><hr style="border: none; border-top: 2px dotted #38ef7d;"></div>
            </div>
        </div>
    </footer>
    </div>
  </body>
</html>
