    <meta charset="UTF-8" />

    <link rel="shortcut icon" href="../favicon/favicon.ico" type="image/x-icon">

  <body>
       <audio id="bgMusic" autoplay loop muted hidden>
  <source src="../img/nhacnen.mp3" type="audio/mpeg">
</audio>
<script>
       //fix nhac
        document.body.addEventListener("click", () => {
            const audio = document.getElementById("bgMusic");
            audio.muted = false;
            audio.play();
        });
    
</script>
    
    <div id="khungtrang">
      <header class="header-section border border-3 border-warning shadow-sm sticky-top bg-dark">
        <div class="container py-1">
          <div class="d-flex align-items-center justify-content-between">
            <a href="../html/home.html" class="d-block">
              <img src="../img/logo.jpg" class="img-fluid logo-img" alt="Logo" style="max-height: 80px;">
            </a>
            <h2 class="text-warning mb-0 mx-auto">Trang đăng ký</h2>
          </div>
        </div>
</header>


    <div class="banner">
          <div class="marquee bg-info mx-auto">
            <span class="text-black">Chào mừng bạn đến với website của chúng tôi. Rất hân hạnh được phục vụ bạn.</span>
          </div>
    </div>

    <main >
      <form id="registerForm">
        
        <div
          class="container text-center mt-5 border border-3 bg-body-tertiary b rounded-2 flex-column mb-5"
          style="width: 550px;"
        >
          <div class="h2 text-primary">Đăng ký</div>
          <div class="row mb-2">
            <div class="col-6">
              <label for="" class="form-label me-4">Họ và tên:</label>
            </div>
          </div>
          <div class="row mb-2">
            <div class="col-12" style="width: 600px">
              <input
                type="text"
                id="name"
                name="Name"
                placeholder="Họ và tên"
                class="form-control"
                onblur="ktten()"
                required
              />
            </div>
            <div class="col-12 mt-1 text-danger text-start">
              <span id="er1">*</span>
            </div>
          </div>
          <div class="row mb-2">
            <div class="col-6">
              <label for="" class="form-label">Số điện thoại: </label>
            </div>
          </div>
          <div class="row mb-2">
            <div class="col-12" style="width: 600px">
              <input
                type="tel"
                id="telnumber"
                name="telnumber"
                placeholder="Số điện thoại"
                class="form-control"
                onblur="kttel()"
                required
              />
            </div>
          </div>
          <div class="col-12 mt-1 text-danger text-start">
            <span class="me-4" id="er2">*</span>
          </div>
          <div class="row mb-2">
            <div class="col-6">
              <label for="" class="form-label me-4">Ngày sinh:</label>
            </div>
          </div>
          <div class="row mb-2">
            <div class="col-12" style="width: 600px">
              <input
                type="date"
                id="date"
                name="date"
                placeholder="Ngày tháng năm sinh"
                class="form-control"
                onblur="checkAge()"
                required
              />
            </div>
          </div>
          <div class="row mb-2">
            <div class="col-6">
              <label for="" class="form-label me-1">Địa chỉ email:</label>
            </div>
          </div>
          <div class="input-group mb-2">
            <input
              id="email"
              name="email"
              type="email"
              class="form-control"
              placeholder="Email"
              onblur="ktemail()"
              required
            />
            <span class="input-group-text">@example.com</span>
          </div>
          <div class="col-12 mt-1 text-danger text-start">
            <span class="me-3" id="er3">*</span>
          </div>
          <div class="row mb-2">
            <div class="col-6">
              <label for="" class="form-label me-4">Tên đăng nhập:</label>
            </div>
          </div>
          <div class="row mb-2">
            <div class="col-12" style="width: 600px">
              <input
                type="text"
                id="name23"
                name="Name23"
                placeholder="Tên đăng nhập"
                class="form-control"
                onblur="kttendn()"
                required
              />
            </div>
            <div class="col-12 mt-1 text-danger text-start">
              <span id="er66">*</span>
            </div>
          </div>
          <div class="row mb-2">
  <div class="col-6">
    <label class="form-label" for="pw">Mật khẩu:</label>
  </div>
</div>
<div class="row mb-2">
  <div class="col-12">
    <div class="input-group">
      <input
        id="pw"
        name="passwords"
        type="password"
        placeholder="Password"
        class="form-control"
        onblur="ktpassword()"
        required
      />
      <button class="btn btn-outline-secondary" type="button" id="btnShow" onclick="togglePassword()">
        Hiện
      </button>
    </div>
    <div class="mt-1 text-start col-12">
      <span id="er4" class="text-danger me-3  ">*</span>
    </div>
  </div>
</div>  
  <div class="row mb-2">
  <div class="col-6">
    <label class="form-label " for="pw2">Nhập lại mật khẩu:</label>
  </div> 
</div>
<div class="row mb-2">
  <div class="col-12">
    <div class="input-group">
      <input
        id="pw2"
        name="password2"
        type="password"
        placeholder="Confirm Password "
        class="form-control"
        onblur="checkpassword2()"
        required
      />
      <button class="btn btn-outline-secondary" type="button" id="btnShow2" onclick="togglePassword2()">
        Hiện
      </button>
    </div>
    <div class="mt-1 text-start col-12">
      <span id="er6" class="text-danger me-3  ">*</span>
    </div>
  </div>
</div>

<div class="row mb-2">

  <div class="col-6">
    <div class="input-group">
      <input 
        id="fileInput" 
        type="file" 
        accept=".jpg,.jpeg,.png,.gif" 
        class="form-control" 
        onchange="previewImage(event)" 
        required
      />
    </div>
    <div class="mt-1 text-start">
      <span id="erFile" class="text-danger"></span>
    </div>
  </div>
  <div class="col-6 d-flex justify-content-center align-items-center">
    <img id="preview" 
         src="" 
         alt="Ảnh đã chọn" 
         class="rounded-circle border border-2" 
         style="width: 120px; height: 120px; object-fit: cover; display: none;">
  </div>
</div>


          <div class="row mb-2">
            <div class="col-12">
              <button
              id="savebtn"
                type="submit"
                class="btn btn-primary"
                style="width: 500px"
              >
                Lưu
              </button>
            </div>
          </div>
        </div>


      
      </form>
    </main>

    
  </div>
    </div>
  </body>
</html>
